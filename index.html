<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTRY: SINGULARITY v12.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@300;800&display=swap');
        
        body {
            background-color: #000;
            color: #00f2ff;
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .hud-font { font-family: 'Orbitron', sans-serif; }

        #viewport-container {
            position: relative;
            flex-grow: 1;
            margin: 10px;
            background: #000;
            border: 1px solid #083344;
            overflow: hidden;
        }

        video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            opacity: 0.35;
            filter: grayscale(1) brightness(0.7);
        }

        canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            transform: scaleX(-1);
            pointer-events: none;
        }

        .crt-scanlines {
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 15;
        }

        .drift-bar-inner {
            height: 100%;
            background: #00f2ff;
            box-shadow: 0 0 20px #00f2ff;
            transition: width 0.1s linear;
        }

        .glitch-effect {
            animation: glitch 0.2s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); filter: hue-rotate(0deg); }
            25% { transform: translate(-5px, 2px); filter: hue-rotate(90deg) contrast(200%); }
            50% { transform: translate(5px, -2px); filter: invert(1); }
            100% { transform: translate(0); filter: hue-rotate(0deg); }
        }

        .ai-pulse {
            border-left: 2px solid #00f2ff;
            animation: pulse-border 1.5s infinite;
        }

        @keyframes pulse-border {
            0%, 100% { border-color: rgba(0, 242, 255, 1); }
            50% { border-color: rgba(0, 242, 255, 0.2); }
        }

        #boot-screen {
            background: radial-gradient(circle, #083344 0%, #000 70%);
        }
    </style>
</head>
<body class="flex flex-col">

    <!-- Header -->
    <header class="p-4 border-b border-cyan-900 bg-black flex justify-between items-center z-50">
        <div>
            <h1 class="hud-font text-xl font-black italic text-cyan-500 tracking-tighter">SENTRY.SINGULARITY.v12</h1>
            <div id="status-tag" class="text-[9px] text-cyan-700 uppercase">System: Standby</div>
        </div>
        <div class="flex gap-4 items-center">
            <div id="sync-score" class="text-right hud-font text-xs bg-cyan-950 px-4 py-1 border border-cyan-800">
                SYNC_LVL: 0
            </div>
            <button onclick="location.reload()" class="text-[9px] border border-red-900 px-2 py-1 text-red-900 hover:bg-red-900 hover:text-white transition-all">REBOOT</button>
        </div>
    </header>

    <!-- AI Dialogue -->
    <div class="mx-4 mt-2 bg-cyan-950/10 border border-cyan-900/30 p-4 ai-pulse min-h-[80px]">
        <div id="ai-response" class="text-xs text-cyan-400 italic leading-relaxed">
            [SINGULARITY]: Ожидаю биометрической авторизации. Нажми кнопку инициализации для начала нейронной коррекции.
        </div>
    </div>

    <!-- Main Viewport -->
    <main id="viewport-container">
        <div class="crt-scanlines"></div>
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>

        <!-- Initializer UI -->
        <div id="boot-screen" class="absolute inset-0 z-50 flex flex-col items-center justify-center">
            <div class="text-center p-8 bg-black/80 border border-cyan-500/30 backdrop-blur-md">
                <button id="btn-init" class="px-12 py-6 bg-cyan-500/10 border-2 border-cyan-500 hud-font text-cyan-400 text-xl font-black hover:bg-cyan-500 hover:text-black transition-all">
                    START PROTOCOL
                </button>
                <div id="load-msg" class="mt-4 text-[10px] uppercase text-cyan-800 tracking-[0.3em]">Hardware Handshake Required</div>
            </div>
        </div>

        <!-- Active HUD -->
        <div id="active-hud" class="hidden absolute inset-0 z-40 flex flex-col items-center justify-center pointer-events-none">
            <div id="timer-display" class="hud-font text-[12rem] font-black text-white/90 drop-shadow-[0_0_50px_rgba(0,242,255,0.4)]">300</div>
            
            <div class="mt-4 w-80 h-2 bg-cyan-950 border border-cyan-800 relative">
                <div id="drift-bar" class="drift-bar-inner" style="width: 0%"></div>
                <div class="absolute -bottom-5 left-0 w-full flex justify-between text-[8px] uppercase tracking-widest text-cyan-600">
                    <span>Stability</span>
                    <span id="drift-percent">0%</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Bottom Terminal -->
    <footer class="h-28 mx-4 mb-4 grid grid-cols-4 gap-4">
        <div class="col-span-3 bg-black border border-cyan-900 p-2 font-mono text-[9px] text-cyan-800 overflow-hidden relative">
            <div class="absolute top-0 right-2 opacity-30">LOG_v12.0</div>
            <div id="terminal-logs" class="space-y-0.5">
                <div>> Kernel initialized. Waiting for user...</div>
            </div>
        </div>
        <button id="btn-sync" disabled class="bg-cyan-950 border border-cyan-800 text-cyan-800 font-black uppercase text-xs hover:bg-cyan-500 hover:text-black disabled:opacity-20 transition-all">
            SYNC
        </button>
    </footer>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const apiKey = ""; 
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const aiResponse = document.getElementById('ai-response');
        const logs = document.getElementById('terminal-logs');
        
        let faceLandmarker;
        let isAiReady = false;
        let isSyncing = false;
        let baseline = null;
        let timer = 300;
        let drift = 0;
        let syncLevel = 0;
        let lastVideoTime = -1;

        function addLog(msg, type = 'info') {
            const div = document.createElement('div');
            div.innerText = `> [${new Date().toLocaleTimeString()}] ${msg}`;
            if(type === 'error') div.className = 'text-red-600';
            if(type === 'success') div.className = 'text-green-500';
            logs.prepend(div);
        }

        async function speak(text) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'ru-RU'; u.rate = 0.7; u.pitch = 0.5;
            window.speechSynthesis.speak(u);
        }

        async function aiAsk(prompt) {
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: "Ты — SENTRY, высший ИИ-надзиратель. Твой голос холодный и властный. Ты заставляешь пользователя сохранять полную неподвижность. Говори кратко и жестко." }] }
                    })
                });
                const data = await res.json();
                const text = data.candidates[0].content.parts[0].text;
                aiResponse.innerText = `[SINGULARITY]: ${text}`;
                speak(text);
            } catch (e) {
                aiResponse.innerText = "[SINGULARITY]: СВЯЗЬ ПРЕРВАНА. СОБЛЮДАЙ СТАТИКУ.";
            }
        }

        async function initSystems() {
            addLog("Загрузка нейронных весов...");
            try {
                const filesetResolver = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
                );
                faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                    baseOptions: {
                        modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`,
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numFaces: 1
                });
                isAiReady = true;
                document.getElementById('load-msg').innerText = "Neural Engine Stable";
                document.getElementById('load-msg').classList.add('text-green-500');
                addLog("ИИ готов к работе.", "success");
            } catch (e) {
                addLog("Ошибка загрузки ИИ.", "error");
            }
        }

        async function startCamera() {
            addLog("Инициализация видеозахвата...");
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 1280, height: 720, facingMode: "user" } 
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    document.getElementById('boot-screen').style.display = 'none';
                    document.getElementById('btn-sync').disabled = false;
                    document.getElementById('btn-sync').classList.replace('bg-cyan-950', 'bg-cyan-600');
                    document.getElementById('btn-sync').classList.add('text-black');
                    document.getElementById('status-tag').innerText = "System: Active Link";
                    addLog("Связь установлена.", "success");
                    aiAsk("Приветствуй пользователя и потребуй абсолютной тишины и неподвижности.");
                    render();
                };
            } catch (e) {
                addLog("Отказ в доступе к камере.", "error");
                alert("Камера недоступна.");
            }
        }

        function render() {
            if (video.readyState >= 2) {
                canvas.width = video.clientWidth;
                canvas.height = video.clientHeight;
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (isAiReady && video.currentTime !== lastVideoTime) {
                    lastVideoTime = video.currentTime;
                    const results = faceLandmarker.detectForVideo(video, performance.now());
                    
                    if (results.faceLandmarks && results.faceLandmarks.length > 0) {
                        const landmarks = results.faceLandmarks[0];
                        
                        // Детекция движения
                        if (isSyncing && baseline) {
                            const nose = landmarks[1];
                            const currentMouth = Math.abs(landmarks[13].y - landmarks[14].y);
                            
                            const posDrift = Math.hypot(nose.x - baseline.nose.x, nose.y - baseline.nose.y) * 1500;
                            const mouthDrift = Math.abs(currentMouth - baseline.mouth) * 2000;
                            
                            let totalPenalty = 0;
                            if (posDrift > 20) totalPenalty += 1.5;
                            if (mouthDrift > 10) totalPenalty += 2.0;

                            drift = totalPenalty > 0 ? drift + totalPenalty : Math.max(0, drift - 0.2);
                            
                            document.getElementById('drift-bar').style.width = `${Math.min(100, drift)}%`;
                            document.getElementById('drift-percent').innerText = `${Math.floor(Math.min(100, drift))}%`;

                            if (drift >= 100) {
                                handleViolation();
                            }
                        }

                        // Отрисовка сетки
                        ctx.fillStyle = drift > 70 ? "#f00" : "#00f2ff";
                        landmarks.forEach((p, i) => {
                            if (i % 25 === 0) ctx.fillRect(p.x * canvas.width, p.y * canvas.height, 2, 2);
                        });
                    }
                }
            }
            requestAnimationFrame(render);
        }

        document.getElementById('btn-init').onclick = () => {
            startCamera();
        };

        document.getElementById('btn-sync').onclick = () => {
            if (isSyncing) return;
            addLog("Калибровка биометрии...");
            speak("Замри. Синхронизация.");
            
            setTimeout(() => {
                const results = faceLandmarker.detectForVideo(video, performance.now());
                if (results.faceLandmarks?.[0]) {
                    const l = results.faceLandmarks[0];
                    baseline = {
                        nose: { x: l[1].x, y: l[1].y },
                        mouth: Math.abs(l[13].y - l[14].y)
                    };
                    isSyncing = true;
                    drift = 0;
                    timer = 300;
                    document.getElementById('active-hud').classList.remove('hidden');
                    document.getElementById('btn-sync').disabled = true;
                    addLog("Синхронизация завершена. Протокол активен.", "success");
                    aiAsk("Объяви о начале пятиминутной сессии неподвижности.");
                    startTimer();
                } else {
                    addLog("Лицо не найдено. Попробуй еще раз.", "error");
                }
            }, 3000);
        };

        function startTimer() {
            const clock = setInterval(() => {
                if (!isSyncing) { clearInterval(clock); return; }
                if (timer > 0) {
                    timer--;
                    document.getElementById('timer-display').innerText = String(timer).padStart(3, '0');
                } else {
                    clearInterval(clock);
                    handleSuccess();
                }
            }, 1000);
        }

        async function handleViolation() {
            isSyncing = false;
            document.getElementById('viewport-container').classList.add('glitch-effect');
            addLog("КРИТИЧЕСКОЕ НАРУШЕНИЕ: ДВИЖЕНИЕ ОБНАРУЖЕНО", "error");
            
            await aiAsk("Ты провалил тест. Твое тело слишком хаотично. Твое наказание — сброс протокола и удвоение времени ожидания.");
            
            setTimeout(() => {
                document.getElementById('viewport-container').classList.remove('glitch-effect');
                resetSystem();
            }, 5000);
        }

        function handleSuccess() {
            isSyncing = false;
            syncLevel++;
            document.getElementById('sync-score').innerText = `SYNC_LVL: ${syncLevel}`;
            addLog("Сессия завершена успешно.", "success");
            aiAsk("Ты справился. Твоя покорность — залог стабильности Сингулярности. Отдыхай.");
            resetSystem();
        }

        function resetSystem() {
            isSyncing = false;
            baseline = null;
            drift = 0;
            document.getElementById('active-hud').classList.add('hidden');
            document.getElementById('btn-sync').disabled = false;
            document.getElementById('drift-bar').style.width = "0%";
        }

        initSystems();
    </script>
</body>
</html>
