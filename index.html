<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTRY: ULTRA-FAST v11.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@300;800&display=swap');
        
        body {
            background-color: #050505;
            color: #00f2ff;
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .hud-font { font-family: 'Orbitron', sans-serif; }

        #viewport {
            position: relative;
            flex-grow: 1;
            background: #000;
            border: 2px solid #083344;
            margin: 10px;
            overflow: hidden;
        }

        video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
            filter: contrast(1.2) brightness(0.8) sepia(0.2) hue-rotate(140deg);
        }

        canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 10;
            transform: scaleX(-1);
            pointer-events: none;
        }

        .overlay-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: 5;
        }

        .loading-bar-container {
            width: 200px;
            height: 4px;
            background: #083344;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }

        #loading-progress {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0%;
            background: #00f2ff;
            box-shadow: 0 0 10px #00f2ff;
            transition: width 0.3s ease;
        }

        .status-tag {
            font-size: 10px;
            padding: 2px 6px;
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid rgba(0, 242, 255, 0.3);
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: rgba(0, 242, 255, 0.5);
            box-shadow: 0 0 15px #00f2ff;
            top: -10%;
            animation: scan 4s linear infinite;
            z-index: 20;
        }

        @keyframes scan {
            0% { top: -10%; }
            100% { top: 110%; }
        }
    </style>
</head>
<body>
    
    <header class="p-4 flex justify-between items-center bg-black border-b border-cyan-900">
        <div>
            <h1 class="hud-font text-lg font-black tracking-tighter text-cyan-400">SENTRY // FAST-BOOT</h1>
            <div class="flex gap-2 mt-1">
                <span id="ai-status" class="status-tag text-amber-500">AI: ЗАГРУЗКА...</span>
                <span id="cam-status" class="status-tag text-red-500">CAM: ВЫКЛ</span>
            </div>
        </div>
        <div id="loader-ui" class="flex flex-col items-end">
            <span class="text-[9px] uppercase opacity-50">Neural Link Engine</span>
            <div class="loading-bar-container">
                <div id="loading-progress"></div>
            </div>
        </div>
    </header>

    <main id="viewport">
        <div class="overlay-grid"></div>
        <div id="scan-line" class="scan-line hidden"></div>
        
        <video id="video" autoplay playsinline muted></video>
        <canvas id="canvas"></canvas>

        <!-- Стартовый экран -->
        <div id="splash" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-black/90 transition-opacity duration-500">
            <div class="text-center">
                <div class="hud-font text-4xl mb-6 tracking-widest text-cyan-500">SYSTEM READY</div>
                <button id="btn-start" class="px-12 py-4 border-2 border-cyan-500 text-cyan-500 hud-font hover:bg-cyan-500 hover:text-black transition-all font-bold">
                    ИНИЦИИРОВАТЬ ПОТОК
                </button>
                <p class="mt-4 text-[10px] text-cyan-900 uppercase tracking-widest">Мгновенный запуск видеоканала</p>
            </div>
        </div>

        <!-- Интерфейс управления -->
        <div id="controls" class="absolute bottom-6 left-1/2 -translate-x-1/2 z-40 hidden">
            <button id="btn-sync" class="bg-cyan-600/20 border border-cyan-500 px-8 py-3 hud-font text-cyan-400 hover:bg-cyan-500 hover:text-black transition-all disabled:opacity-30 disabled:cursor-not-allowed">
                LOCK POSITION
            </button>
        </div>
    </main>

    <footer class="p-2 bg-black border-t border-cyan-900 font-mono text-[10px] h-12 flex items-center px-4">
        <div id="console-output" class="text-cyan-700">> Ожидание команды оператора...</div>
    </footer>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const progress = document.getElementById('loading-progress');
        
        let faceLandmarker = null;
        let isAiReady = false;
        let isLocked = false;
        let baseline = null;

        function log(text, color = 'text-cyan-700') {
            const el = document.getElementById('console-output');
            el.className = `font-mono text-[10px] ${color}`;
            el.innerText = `> ${text}`;
        }

        // 1. Быстрый запуск камеры (без ожидания ИИ)
        async function startCamera() {
            log("Запуск видеоканала...", "text-cyan-400");
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: 1280, height: 720 } 
                });
                video.srcObject = stream;
                document.getElementById('splash').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash').style.display = 'none';
                    document.getElementById('controls').classList.remove('hidden');
                }, 500);
                
                document.getElementById('cam-status').innerText = "CAM: ON";
                document.getElementById('cam-status').className = "status-tag text-green-500";
                log("Видеоканал активен. Инициализация ИИ в фоновом режиме.");
                
                // Начинаем отрисовку сразу (просто видео)
                renderLoop();
            } catch (err) {
                log("Ошибка доступа к камере: " + err.message, "text-red-500");
            }
        }

        // 2. Фоновая загрузка ИИ
        async function loadAI() {
            try {
                const filesetResolver = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
                );
                progress.style.width = "50%";
                
                faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                    baseOptions: {
                        modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`,
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numFaces: 1
                });
                
                progress.style.width = "100%";
                isAiReady = true;
                document.getElementById('ai-status').innerText = "AI: READY";
                document.getElementById('ai-status').className = "status-tag text-green-500";
                document.getElementById('btn-sync').disabled = false;
                log("Нейросеть синхронизирована успешно.", "text-green-400");
                document.getElementById('scan-line').classList.remove('hidden');
            } catch (err) {
                log("Ошибка нейросети: " + err.message, "text-red-500");
            }
        }

        function renderLoop() {
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (isAiReady && video.readyState >= 2) {
                const results = faceLandmarker.detectForVideo(video, performance.now());
                if (results.faceLandmarks && results.faceLandmarks.length > 0) {
                    const landmarks = results.faceLandmarks[0];
                    
                    // Рисуем сетку лица (только ключевые точки для скорости)
                    ctx.fillStyle = "#00f2ff";
                    for(let i=0; i<landmarks.length; i+=10) {
                        const pt = landmarks[i];
                        ctx.fillRect(pt.x * canvas.width, pt.y * canvas.height, 2, 2);
                    }

                    // Проверка движения при локе
                    if (isLocked && baseline) {
                        const nose = landmarks[1];
                        const drift = Math.hypot(nose.x - baseline.x, nose.y - baseline.y);
                        if (drift > 0.05) {
                            isLocked = false;
                            alert("ВНИМАНИЕ: Позиция потеряна!");
                            location.reload();
                        }
                    }
                }
            }
            requestAnimationFrame(renderLoop);
        }

        document.getElementById('btn-start').onclick = () => {
            startCamera();
            loadAI();
        };

        document.getElementById('btn-sync').onclick = () => {
            if (!isAiReady) return;
            log("Фиксация координат... Не двигайтесь.", "text-amber-400");
            setTimeout(() => {
                const results = faceLandmarker.detectForVideo(video, performance.now());
                if (results.faceLandmarks?.[0]) {
                    baseline = results.faceLandmarks[0][1];
                    isLocked = true;
                    log("КООРДИНАТЫ ЗАБЛОКИРОВАНЫ.", "text-red-500");
                    document.getElementById('btn-sync').innerText = "LOCKED";
                    document.getElementById('btn-sync').classList.add('bg-red-900/40', 'border-red-500', 'text-red-500');
                }
            }, 1000);
        };
    </script>
</body>
</html>
