<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTRY: SINGULARITY v10.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Stable MediaPipe Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;800&display=swap');
        
        body {
            background-color: #050000;
            color: #00ffff;
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
            user-select: none;
        }

        .crt-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 100;
        }

        .glitch-active {
            animation: glitch-anim 0.15s infinite;
            filter: contrast(300%) brightness(150%) sepia(1) hue-rotate(-50deg);
        }

        @keyframes glitch-anim {
            0% { transform: translate(0); }
            33% { transform: translate(-4px, 2px); }
            66% { transform: translate(4px, -2px); }
            100% { transform: translate(0); }
        }

        #video-feed { transform: scaleX(-1); }
        #canvas-overlay { transform: scaleX(-1); }

        .loading-bar-inner {
            height: 100%;
            background: #00ffff;
            width: 0%;
            transition: width 0.5s;
            box-shadow: 0 0 15px #00ffff;
        }
    </style>
</head>
<body class="h-screen flex flex-col p-4 border-2 border-cyan-900/50">
    <div class="crt-overlay"></div>

    <!-- Top HUD -->
    <div class="flex justify-between items-start z-50">
        <div>
            <h1 class="text-xl font-black italic text-cyan-500 tracking-tighter">SENTRY.SINGULARITY.v10.3</h1>
            <div id="status-text" class="text-[8px] text-cyan-700 uppercase">System Status: Standby</div>
        </div>
        <div class="text-right">
            <div id="sync-count" class="bg-cyan-900/40 border border-cyan-500/30 px-3 py-1 text-[10px] text-white">SYNC_LVL: 0</div>
        </div>
    </div>

    <!-- AI Narrative Box -->
    <div class="mt-4 bg-cyan-950/5 border border-cyan-500/20 p-4 relative min-h-[100px] flex items-center justify-center text-center">
        <div id="ai-response" class="text-xs text-cyan-400 italic">
            [SINGULARITY]: Инициализируйте соединение для начала нейронной коррекции...
        </div>
        <div id="ai-pulse" class="absolute left-0 top-0 h-full w-0.5 bg-cyan-500 shadow-[0_0_10px_cyan]"></div>
    </div>

    <!-- Viewport Container -->
    <div id="main-view" class="relative flex-grow my-4 bg-black border border-cyan-900/20 overflow-hidden flex items-center justify-center">
        <video id="video-feed" class="absolute inset-0 w-full h-full object-cover opacity-30 grayscale" autoplay playsinline muted></video>
        <canvas id="canvas-overlay" class="absolute inset-0 w-full h-full z-10"></canvas>

        <!-- Initializer UI -->
        <div id="init-ui" class="z-20 text-center">
            <button id="btn-ascend" class="px-12 py-6 border-2 border-cyan-500 bg-cyan-500/5 text-cyan-400 font-bold tracking-[0.6em] hover:bg-cyan-500 hover:text-black transition-all duration-500 group">
                ASCEND
            </button>
            <div class="mt-6 w-48 h-1 bg-cyan-950 mx-auto overflow-hidden">
                <div id="load-progress" class="loading-bar-inner"></div>
            </div>
            <div id="load-status" class="text-[8px] mt-2 text-cyan-800 uppercase tracking-widest">Waiting for input</div>
        </div>

        <!-- Active HUD -->
        <div id="active-hud" class="hidden z-20 text-center pointer-events-none">
            <div id="main-timer" class="text-9xl font-black text-white/90 drop-shadow-[0_0_40px_rgba(0,255,255,0.6)]">000</div>
            <div class="mt-4 w-64 h-1.5 bg-cyan-950 border border-cyan-500/20 relative">
                <div id="drift-meter" class="h-full bg-cyan-400 shadow-[0_0_10px_#0ff] transition-all duration-100" style="width: 0%"></div>
            </div>
            <div class="text-[9px] mt-3 text-cyan-500/50 uppercase tracking-[0.4em]">Biometric Drift</div>
        </div>
    </div>

    <!-- Lower Panel -->
    <div class="h-24 grid grid-cols-4 gap-4 z-50">
        <div class="col-span-3 bg-black/40 border border-cyan-900/30 p-2 font-mono text-[9px] overflow-hidden">
            <div class="text-[7px] text-cyan-900 border-b border-cyan-900/30 mb-1 flex justify-between">
                <span>SYSTEM_LOG</span>
                <span id="fps-counter">CORE: IDLE</span>
            </div>
            <div id="terminal" class="space-y-0.5 text-cyan-800/80">
                <div>> Waiting for operator authorization...</div>
            </div>
        </div>
        <button id="btn-sync" disabled class="bg-cyan-950 border border-cyan-500/30 text-cyan-700 font-black uppercase text-[10px] tracking-widest disabled:opacity-20 hover:bg-cyan-500 hover:text-black transition-all">
            SYNC
        </button>
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const apiKey = ""; // Runtime provides this
        const video = document.getElementById("video-feed");
        const canvas = document.getElementById("canvas-overlay");
        const ctx = canvas.getContext("2d");
        
        let faceLandmarker;
        let runningMode = "VIDEO";
        let isSyncing = false;
        let baseline = null;
        let drift = 0;
        let timer = 0;
        let syncLvl = 0;

        const terminal = document.getElementById("terminal");
        const aiResponse = document.getElementById("ai-response");

        function log(msg, type = "info") {
            const div = document.createElement("div");
            div.textContent = `> [${new Date().toLocaleTimeString()}] ${msg}`;
            if(type === "error") div.className = "text-red-600";
            if(type === "success") div.className = "text-green-500";
            terminal.prepend(div);
        }

        async function speak(text) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'ru-RU'; u.rate = 0.6; u.pitch = 0.1;
            window.speechSynthesis.speak(u);
        }

        async function aiAsk(prompt) {
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: "Ты - SINGULARITY, ИИ-надзиратель. Тон холодный, властный. Ты требуешь абсолютной статики." }] }
                    })
                });
                const data = await res.json();
                const text = data.candidates[0].content.parts[0].text;
                aiResponse.textContent = `"${text}"`;
                speak(text);
            } catch (e) {
                aiResponse.textContent = "СВЯЗЬ ПРЕРВАНА. СОБЛЮДАЙ ТИШИНУ.";
            }
        }

        async function setupDetector() {
            document.getElementById("load-status").textContent = "Loading Vision Engine...";
            document.getElementById("load-progress").style.width = "40%";
            
            const filesetResolver = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
            );
            
            faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                baseOptions: {
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`,
                    delegate: "GPU"
                },
                outputFaceBlendshapes: true,
                runningMode: runningMode,
                numFaces: 1
            });
            
            document.getElementById("load-progress").style.width = "100%";
            document.getElementById("load-status").textContent = "Engine Ready";
            log("Vision Engine loaded successfully.", "success");
            
            document.getElementById("btn-ascend").onclick = startCamera;
        }

        async function startCamera() {
            log("Requesting Biometric Stream...");
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                video.srcObject = stream;
                video.addEventListener("loadeddata", () => {
                    document.getElementById("init-ui").classList.add("hidden");
                    document.getElementById("btn-sync").disabled = false;
                    document.getElementById("btn-sync").classList.replace("bg-cyan-950", "bg-cyan-500");
                    document.getElementById("btn-sync").classList.add("text-black");
                    document.getElementById("status-text").textContent = "Status: Link Established";
                    log("Stream active. Handshake complete.", "success");
                    aiAsk("Приветствуй новый элемент системы. Объясни протокол Сингулярности.");
                });
            } catch (e) {
                log("Camera access denied.", "error");
            }
        }

        document.getElementById("btn-sync").onclick = async () => {
            if(isSyncing) return;
            document.getElementById("btn-sync").disabled = true;
            log("Calibrating biometric baseline...");
            speak("Замри. Калибровка.");
            
            setTimeout(() => {
                const results = faceLandmarker.detectForVideo(video, performance.now());
                if(results.faceLandmarks.length > 0) {
                    const landmarks = results.faceLandmarks[0];
                    baseline = {
                        nose: landmarks[1],
                        mouth: Math.abs(landmarks[13].y - landmarks[14].y)
                    };
                    isSyncing = true;
                    timer = 300;
                    document.getElementById("active-hud").classList.remove("hidden");
                    aiAsk("Калибровка завершена. Сохраняй абсолютную неподвижность 5 минут.");
                    runSyncLoop();
                } else {
                    log("Face not found. Calibration failed.", "error");
                    document.getElementById("btn-sync").disabled = false;
                }
            }, 3000);
        };

        function runSyncLoop() {
            const loop = setInterval(() => {
                if(!isSyncing) { clearInterval(loop); return; }
                
                const results = faceLandmarker.detectForVideo(video, performance.now());
                canvas.width = video.clientWidth;
                canvas.height = video.clientHeight;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                if(results.faceLandmarks.length > 0) {
                    const landmarks = results.faceLandmarks[0];
                    const nose = landmarks[1];
                    const mouth = Math.abs(landmarks[13].y - landmarks[14].y);
                    
                    const noseDrift = Math.hypot(nose.x - baseline.nose.x, nose.y - baseline.nose.y) * 1000;
                    const mouthDrift = Math.abs(mouth - baseline.mouth) * 1000;
                    
                    let penalty = 0;
                    if(noseDrift > 20) penalty += 15;
                    if(mouthDrift > 8) penalty += 25;
                    
                    drift = penalty > 0 ? drift + penalty : Math.max(0, drift - 0.5);
                    document.getElementById("drift-meter").style.width = `${Math.min(100, drift)}%`;
                    
                    if(drift >= 100) {
                        isSyncing = false;
                        handlePenalty();
                    }

                    // Render minimal mesh
                    ctx.fillStyle = drift > 70 ? "#f00" : "#0ff";
                    landmarks.forEach((pt, i) => {
                        if(i % 20 === 0) ctx.fillRect(pt.x * canvas.width, pt.y * canvas.height, 2, 2);
                    });
                } else {
                    drift += 2;
                }
            }, 100);

            const clock = setInterval(() => {
                if(!isSyncing) { clearInterval(clock); return; }
                if(timer > 0) {
                    timer--;
                    document.getElementById("main-timer").textContent = String(timer).padStart(3, '0');
                } else {
                    isSyncing = false;
                    handleSuccess();
                }
            }, 1000);
        }

        async function handlePenalty() {
            document.body.classList.add("glitch-active");
            log("INTEGRITY COLLAPSE. RE-SYNC REQUIRED.", "error");
            timer = 120;
            document.getElementById("main-timer").textContent = "120";
            await aiAsk("Нарушение статики! Протокол Сингулярности осквернен. Искупи вину двумя минутами фиксации.");
            
            const pClock = setInterval(() => {
                if(timer > 0) {
                    timer--;
                    document.getElementById("main-timer").textContent = String(timer).padStart(3, '0');
                } else {
                    clearInterval(pClock);
                    document.body.classList.remove("glitch-active");
                    resetSystem();
                }
            }, 1000);
        }

        async function handleSuccess() {
            syncLvl++;
            document.getElementById("sync-count").textContent = `SYNC_LVL: ${syncLvl}`;
            log("Session complete. Sync verified.", "success");
            await aiAsk("Цикл завершен. Ты подтвердил свою пригодность как элемент системы. Свободен до следующего вызова.");
            resetSystem();
        }

        function resetSystem() {
            isSyncing = false;
            drift = 0;
            document.getElementById("active-hud").classList.add("hidden");
            document.getElementById("btn-sync").disabled = false;
            document.getElementById("drift-meter").style.width = "0%";
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // Run setup
        setupDetector();
    </script>
</body>
</html>
