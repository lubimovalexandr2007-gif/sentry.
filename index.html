<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTRY: ULTIMATE v11.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@300;800&display=swap');
        
        body {
            background-color: #020202;
            color: #00f2ff;
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
            height: 100vh;
            margin: 0;
        }

        .hud-font { font-family: 'Orbitron', sans-serif; }

        /* Фикс для видимости видео */
        #video-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            position: absolute;
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
            transform: scaleX(-1);
            opacity: 0.4; /* Сделаем чуть прозрачным для HUD эффекта */
        }

        canvas {
            position: absolute;
            width: 100% !important;
            height: 100% !important;
            z-index: 10;
            transform: scaleX(-1);
            pointer-events: none;
        }

        .crt-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 30;
        }

        .loading-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        .glitch-text {
            text-shadow: 2px 0 #f0f, -2px 0 #0ff;
        }
    </style>
</head>
<body class="flex flex-col p-4 border-[1px] border-cyan-900/40">
    
    <header class="flex justify-between items-end border-b border-cyan-950 pb-2 z-40 bg-black/80">
        <div>
            <h1 class="hud-font text-xl font-black italic tracking-widest text-cyan-400">SENTRY // V11.2</h1>
            <div id="cam-status" class="text-[9px] uppercase tracking-tighter text-red-600">Система: Ожидание</div>
        </div>
        <div class="text-right">
            <button id="btn-restart" class="text-[10px] bg-red-950/30 border border-red-900 px-2 py-1 hover:bg-red-900 transition-colors">ПЕРЕЗАПУСК КАМЕРЫ</button>
        </div>
    </header>

    <div class="mt-2 bg-cyan-950/10 border border-cyan-900/20 p-3 min-h-[60px] relative">
        <div id="ai-text" class="text-[11px] italic text-cyan-300 leading-tight">
            [ЛОГ]: Установите визуальный контакт для инициализации протокола.
        </div>
    </div>

    <main id="viewport" class="relative flex-grow my-4 bg-zinc-950 border border-cyan-950 overflow-hidden">
        <div class="crt-overlay"></div>
        
        <div id="video-container">
            <video id="video-element" autoplay playsinline muted></video>
            <canvas id="canvas-element"></canvas>
            
            <!-- Центр управления -->
            <div id="ui-layer" class="absolute inset-0 z-50 flex flex-col items-center justify-center">
                <div id="init-screen" class="text-center p-6 bg-black/60 backdrop-blur-sm border border-cyan-500/30 rounded">
                    <button id="btn-activate" class="group relative px-10 py-5 bg-cyan-600/10 border-2 border-cyan-500 transition-all hover:bg-cyan-500">
                        <span class="hud-font font-black text-cyan-400 group-hover:text-black">ВКЛЮЧИТЬ ПИТАНИЕ</span>
                    </button>
                    <div id="status-msg" class="mt-4 text-[10px] uppercase text-cyan-800 loading-pulse">Ожидание ядра нейросети...</div>
                </div>

                <div id="active-hud" class="hidden text-center">
                    <div id="timer" class="hud-font text-8xl font-black text-white/80 glitch-text">000</div>
                    <div class="mt-4 text-[10px] uppercase tracking-[0.5em] text-cyan-500">Fixed Position Required</div>
                </div>
            </div>
        </div>
    </main>

    <footer class="h-16 flex gap-4">
        <div class="flex-grow bg-black/80 border border-cyan-950 p-2 font-mono text-[9px] text-cyan-800 overflow-hidden">
            <div id="logs">> Инициализация...</div>
        </div>
        <button id="btn-sync" disabled class="w-32 bg-cyan-950 border border-cyan-800 text-cyan-900 font-black uppercase text-xs disabled:opacity-20">SYNC</button>
    </footer>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const apiKey = "";
        const video = document.getElementById('video-element');
        const canvas = document.getElementById('canvas-element');
        const ctx = canvas.getContext('2d');
        
        let faceLandmarker;
        let isRunning = false;
        let baseline = null;
        let lastVideoTime = -1;

        async function addLog(msg, color = 'text-cyan-800') {
            const l = document.getElementById('logs');
            l.innerHTML = `<div class="${color}">> ${msg}</div>` + l.innerHTML;
        }

        async function init() {
            try {
                const filesetResolver = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
                );
                faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                    baseOptions: {
                        modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`,
                        delegate: "GPU"
                    },
                    outputFaceBlendshapes: true,
                    runningMode: "VIDEO",
                    numFaces: 1
                });
                document.getElementById('status-msg').textContent = "Ядро готово. Нажмите для запуска.";
                document.getElementById('status-msg').className = "mt-4 text-[10px] uppercase text-green-500 font-bold";
                addLog("Neural Core Loaded.", "text-green-500");
            } catch (e) {
                addLog("Ошибка загрузки модели: " + e.message, "text-red-500");
            }
        }

        async function startCamera() {
            addLog("Запрос доступа к медиа-потоку...");
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 1280, height: 720, frameRate: 30 } 
                });
                video.srcObject = stream;
                
                // Принудительный старт видео
                video.onloadedmetadata = () => {
                    video.play();
                    document.getElementById('init-screen').classList.add('hidden');
                    document.getElementById('btn-sync').disabled = false;
                    document.getElementById('cam-status').textContent = "Камера: Активна";
                    document.getElementById('cam-status').className = "text-[9px] text-green-500 uppercase";
                    addLog("Визуальный канал открыт.", "text-cyan-400");
                    detect();
                };
            } catch (e) {
                addLog("ОШИБКА КАМЕРЫ: " + e.name, "text-red-500");
                alert("Не удалось включить камеру. Убедитесь, что она не используется другим приложением.");
            }
        }

        function detect() {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                
                // Рисуем видео на канвас вручную, если оно "черное"
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                const results = faceLandmarker.detectForVideo(video, performance.now());
                
                ctx.save();
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                if (results.faceLandmarks && results.faceLandmarks.length > 0) {
                    const landmarks = results.faceLandmarks[0];
                    ctx.fillStyle = "#0ff";
                    landmarks.forEach((pt, i) => {
                        if (i % 30 === 0) ctx.fillRect(pt.x * canvas.width, pt.y * canvas.height, 4, 4);
                    });
                    
                    if (isRunning && baseline) {
                        checkMotion(landmarks);
                    }
                }
                ctx.restore();
            }
            requestAnimationFrame(detect);
        }

        function checkMotion(landmarks) {
            const nose = landmarks[1];
            const dist = Math.hypot(nose.x - baseline.x, nose.y - baseline.y);
            if (dist > 0.04) {
                triggerViolation();
            }
        }

        function triggerViolation() {
            isRunning = false;
            document.getElementById('active-hud').innerHTML = "<div class='text-red-600 font-black text-4xl'>НАРУШЕНИЕ</div>";
            addLog("ДВИЖЕНИЕ ОБНАРУЖЕНО. ПРОТОКОЛ СБРОШЕН.", "text-red-500");
            setTimeout(() => location.reload(), 3000);
        }

        document.getElementById('btn-activate').onclick = startCamera;
        document.getElementById('btn-restart').onclick = () => location.reload();
        
        document.getElementById('btn-sync').onclick = () => {
            addLog("Калибровка... Не двигайтесь.");
            setTimeout(() => {
                const results = faceLandmarker.detectForVideo(video, performance.now());
                if (results.faceLandmarks?.[0]) {
                    baseline = results.faceLandmarks[0][1];
                    isRunning = true;
                    document.getElementById('init-screen').classList.add('hidden');
                    document.getElementById('active-hud').classList.remove('hidden');
                    addLog("СИНХРОНИЗАЦИЯ ЗАВЕРШЕНА. ЗАМРИТЕ.", "text-green-500");
                }
            }, 2000);
        };

        init();
    </script>
</body>
</html>
