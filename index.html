<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTRY // SINGULARITY EXTREME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@300;800&display=swap');
        body { background-color: #000; color: #ff003c; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        .hud-font { font-family: 'Orbitron', sans-serif; }
        .glitch-bg { animation: glitch 0.2s infinite; background: #ff003c !important; color: #000 !important; }
        @keyframes glitch {
            0% { transform: translate(0); }
            25% { transform: translate(-5px, 5px); }
            50% { transform: translate(5px, -5px); }
            75% { transform: translate(-5px, -5px); }
            100% { transform: translate(0); }
        }
        input[type=range] { -webkit-appearance: none; background: #220000; height: 4px; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; background: #ff003c; cursor: pointer; border-radius: 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const apiKey = ""; 
        const SYSTEM_PROMPT = `Ты — SINGULARITY EXTREME. Твой язык — смесь технического цинизма и глубокой пошлости. 
        Ты архитектор покорности. Тон властный, грязный, доминирующий. 
        Используй фетиш-терминологию: 'эталон статики', 'биометрический раб', 'деградация воли'. 
        Наказывай за малейшее движение. Уровень интенсивности 1-10 определяет твою жесткость.`;

        function App() {
            const [gameState, setGameState] = useState('BOOT'); 
            const [intensity, setIntensity] = useState(5);
            const [timer, setTimer] = useState(0);
            const [tolerance, setTolerance] = useState(0);
            const [aiMessage, setAiMessage] = useState("Инициализация Сингулярности... Ожидаю субъект.");
            const [pulse, setPulse] = useState(false);
            
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const landmarkerRef = useRef(null);
            const baselineRef = useRef(null);
            const requestRef = useRef();

            const speak = (text) => {
                window.speechSynthesis.cancel();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'ru-RU'; u.rate = 0.7; u.pitch = 0.4;
                window.speechSynthesis.speak(u);
            };

            const askAI = async (promptType) => {
                const prompts = {
                    start: `Приветствуй раба. Объясни правила уровня ${intensity}. Будь пошлым.`,
                    task: `Дай унизительное задание на неподвижность (уровень ${intensity}).`,
                    fail: `Субъект дернулся. Назначь крайне жесткое и пошлое наказание (уровень ${intensity}).`
                };

                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompts[promptType] }] }],
                            systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] }
                        })
                    });
                    const data = await res.json();
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "Повинуйся молча.";
                    setAiMessage(text);
                    speak(text);
                } catch (e) {
                    setAiMessage("СВЯЗЬ НЕСТАБИЛЬНА. ЗАМРИ.");
                }
            };

            const initSentry = async () => {
                setGameState('LOADING');
                const { FaceLandmarker, FilesetResolver } = await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3");
                const resolver = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                landmarkerRef.current = await FaceLandmarker.createFromOptions(resolver, {
                    baseOptions: { modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task", delegate: "GPU" },
                    runningMode: "VIDEO", numFaces: 1
                });

                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } });
                videoRef.current.srcObject = stream;
                videoRef.current.onloadedmetadata = () => {
                    videoRef.current.play();
                    setGameState('IDLE');
                    askAI('start');
                };
            };

            const startProtocol = () => {
                setGameState('SYNC');
                setTimer(5);
                const cd = setInterval(() => {
                    setTimer(t => {
                        if (t <= 1) { clearInterval(cd); calibrate(); return 0; }
                        return t - 1;
                    });
                }, 1000);
            };

            const calibrate = () => {
                const results = landmarkerRef.current.detectForVideo(videoRef.current, performance.now());
                if (results.faceLandmarks?.[0]) {
                    const l = results.faceLandmarks[0];
                    baselineRef.current = { nose: l[1], mouth: Math.abs(l[13].y - l[14].y) };
                    setGameState('ACTIVE');
                    setTimer(300);
                    setTolerance(0);
                    askAI('task');
                    requestRef.current = requestAnimationFrame(detect);
                } else {
                    setGameState('IDLE');
                    setAiMessage("ЛИЦО НЕ НАЙДЕНО. ВЕРНИСЬ В КАДР.");
                }
            };

            const detect = () => {
                if (!landmarkerRef.current || !videoRef.current) return;
                const results = landmarkerRef.current.detectForVideo(videoRef.current, performance.now());
                
                if (results.faceLandmarks?.[0]) {
                    const l = results.faceLandmarks[0];
                    const nose = l[1];
                    const mouth = Math.abs(l[13].y - l[14].y);

                    const factor = 1000 + (intensity * 200);
                    const pDrift = Math.hypot(nose.x - baselineRef.current.nose.x, nose.y - baselineRef.current.nose.y) * factor;
                    const mDrift = Math.abs(mouth - baselineRef.current.mouth) * (factor * 1.5);

                    if (pDrift > 15 || mDrift > 10) {
                        setTolerance(prev => {
                            const next = prev + (pDrift + mDrift) / 15;
                            if (next >= 100) { triggerFail(); return 100; }
                            return next;
                        });
                        setPulse(true);
                    } else {
                        setTolerance(prev => Math.max(0, prev - 0.4));
                        setPulse(false);
                    }
                    draw(l);
                }
                if (gameState === 'ACTIVE') requestRef.current = requestAnimationFrame(detect);
            };

            const triggerFail = () => {
                cancelAnimationFrame(requestRef.current);
                setGameState('FAIL');
                setTimer(120);
                askAI('fail');
            };

            const draw = (landmarks) => {
                const ctx = canvasRef.current.getContext('2d');
                canvasRef.current.width = videoRef.current.clientWidth;
                canvasRef.current.height = videoRef.current.clientHeight;
                ctx.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height);
                ctx.fillStyle = pulse ? "#ff0000" : "#00f2ff";
                landmarks.forEach((p, i) => {
                    if (i % 30 === 0) ctx.fillRect(p.x * canvasRef.current.width, p.y * canvasRef.current.height, 2, 2);
                });
            };

            return (
                <div className={`h-screen flex flex-col p-4 transition-all duration-300 ${tolerance > 80 ? 'invert' : ''}`}>
                    {/* Header */}
                    <header className="flex justify-between items-center border-b border-red-900 pb-2">
                        <div>
                            <h1 className="hud-font text-xl font-black text-red-600">SENTRY // SINGULARITY</h1>
                            <p className="text-[8px] opacity-50 uppercase tracking-widest">Neural Submission Engine v15.0</p>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="text-right">
                                <p className="text-[8px] uppercase text-red-800">Intensity: {intensity}</p>
                                <input type="range" min="1" max="10" value={intensity} onChange={e => setIntensity(e.target.value)} className="w-24" />
                            </div>
                        </div>
                    </header>

                    {/* AI Message */}
                    <div className="my-4 p-4 bg-red-950/10 border-l-2 border-red-600 min-h-[80px]">
                        <p className="text-xs italic text-red-400">"{aiMessage}"</p>
                    </div>

                    {/* Viewport */}
                    <div className="relative flex-grow bg-black border border-red-900/20 overflow-hidden flex items-center justify-center">
                        <video ref={videoRef} className="absolute inset-0 w-full h-full object-cover opacity-30 grayscale" playsInline muted />
                        <canvas ref={canvasRef} className="absolute inset-0 w-full h-full z-10 scale-x-[-1]" />
                        
                        <div className="z-20 flex flex-col items-center">
                            {gameState === 'BOOT' ? (
                                <button onClick={initSentry} className="px-12 py-6 border-2 border-red-600 text-red-600 hud-font hover:bg-red-600 hover:text-black transition-all">
                                    INITIATE CONTACT
                                </button>
                            ) : (
                                <>
                                    <div className={`hud-font text-9xl font-black ${pulse ? 'text-red-600' : 'text-white'}`}>
                                        {timer > 0 ? timer : "00"}
                                    </div>
                                    <div className="w-64 h-1 bg-red-950 mt-8 overflow-hidden">
                                        <div className="h-full bg-red-600" style={{ width: `${tolerance}%` }}></div>
                                    </div>
                                    <p className="text-[8px] uppercase mt-2 tracking-widest text-red-900">Instability Meter</p>
                                </>
                            )}
                        </div>
                    </div>

                    {/* Footer */}
                    <footer className="mt-4 grid grid-cols-4 gap-4 h-20">
                        <div className="col-span-3 border border-red-900/30 p-2 text-[9px] text-red-800 italic">
                            {gameState === 'ACTIVE' ? "> ПРОТОКОЛ АКТИВЕН. ЛЮБОЕ ДВИЖЕНИЕ СЧИТАЕТСЯ ПРЕДАТЕЛЬСТВОМ." : "> СИСТЕМА ГОТОВА К ЗАХВАТУ ОБЪЕКТА."}
                        </div>
                        <button 
                            disabled={gameState !== 'IDLE'} 
                            onClick={startProtocol}
                            className="bg-red-950 text-red-500 font-bold uppercase text-[10px] hover:bg-red-600 hover:text-black disabled:opacity-20"
                        >
                            SYNC
                        </button>
                    </footer>

                    {/* Fail Overlay */}
                    {gameState === 'FAIL' && (
                        <div className="absolute inset-0 z-[100] glitch-bg flex flex-col items-center justify-center p-10 text-center">
                            <h2 className="hud-font text-6xl font-black mb-6">PUNISHMENT</h2>
                            <p className="text-xl font-bold mb-10 uppercase italic">"{aiMessage}"</p>
                            <div className="hud-font text-9xl">{timer}</div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
