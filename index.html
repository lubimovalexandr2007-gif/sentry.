<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SENTRY SYSTEM</title>
    <!-- Подключаем Telegram SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@800&display=swap');
        body { background-color: #000; color: #ff0000; font-family: 'JetBrains Mono', monospace; overflow: hidden; }
        .glitch { text-shadow: 2px 0 #00fff0, -2px 0 #ff00c1; animation: glitch 2s infinite; }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        .room-btn { border: 1px solid #300; transition: all 0.2s; font-size: 10px; }
        .room-active { border-color: #ff0000; background: rgba(255, 0, 0, 0.2); color: #fff; }
    </style>
</head>
<body class="h-screen flex flex-col p-4 select-none">

    <!-- Заголовок системы -->
    <div class="flex justify-between items-center mb-4 border-b border-red-900 pb-2">
        <div class="text-[10px] uppercase font-black">Sentry_Omni_v1.5</div>
        <div id="status-tag" class="text-[10px] text-green-500 animate-pulse uppercase">Система готова</div>
    </div>

    <!-- Основной монитор (Камера) -->
    <div class="relative flex-grow bg-zinc-950 border border-red-900 rounded-lg overflow-hidden flex items-center justify-center">
        <video id="webcam" class="absolute inset-0 w-full h-full object-cover opacity-30 grayscale" autoplay playsinline muted></video>
        
        <div class="z-10 text-center px-4">
            <div id="main-instruction" class="text-lg font-black uppercase mb-4 leading-tight">Инициализируйте доступ</div>
            <div id="countdown" class="text-6xl font-black mb-2">--</div>
            <div id="sub-text" class="text-[10px] opacity-50 uppercase tracking-widest">Ожидание команды</div>
        </div>

        <!-- Сетка HUD -->
        <div class="absolute inset-0 pointer-events-none border-[20px] border-transparent opacity-10" style="background-image: radial-gradient(#f00 1px, transparent 1px); background-size: 15px 15px;"></div>
    </div>

    <!-- Выбор локации -->
    <div class="grid grid-cols-4 gap-2 my-4" id="room-selector">
        <button onclick="changeRoom('BED')" class="room-btn room-active py-2">СПАЛЬНЯ</button>
        <button onclick="changeRoom('BATH')" class="room-btn py-2">ВАННАЯ</button>
        <button onclick="changeRoom('KIT')" class="room-btn py-2">КУХНЯ</button>
        <button onclick="changeRoom('OUT')" class="room-btn py-2">УЛИЦА</button>
    </div>

    <!-- Кнопка действия -->
    <button id="action-btn" onclick="startCommand()" class="w-full py-5 bg-red-700 text-white font-black uppercase text-sm tracking-[0.3em] active:scale-95 transition-transform shadow-[0_0_20px_rgba(185,28,28,0.5)]">
        Принять приказ
    </button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const video = document.getElementById('webcam');
        const instr = document.getElementById('main-instruction');
        const timerDisp = document.getElementById('countdown');
        const subText = document.getElementById('sub-text');
        const statusTag = document.getElementById('status-tag');

        let currentRoom = 'BED';
        const tasks = {
            'BED': ['Замри и не дыши', 'Руки за голову', 'Смотри в объектив'],
            'BATH': ['Включи воду', 'Коснись холодного кафеля', 'Зеркальный отчет'],
            'KIT': ['Планка 30 секунд', 'Стой у стола', 'Считай приборы'],
            'OUT': ['Найди тень', 'Замри в движении', 'Публичный отчет']
        };

        // Запуск камеры (максимально просто)
        async function startWebcam() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user' }, 
                    audio: false 
                });
                video.srcObject = stream;
                statusTag.innerText = "Канал связи: OK";
                statusTag.classList.replace('text-green-500', 'text-blue-500');
            } catch (err) {
                console.error(err);
                instr.innerText = "Ошибка камеры!";
                subText.innerText = "Проверьте разрешения HTTPS";
            }
        }

        function changeRoom(room) {
            currentRoom = room;
            document.querySelectorAll('.room-btn').forEach(b => b.classList.remove('room-active'));
            event.target.classList.add('room-active');
            tg.HapticFeedback.impactOccurred('light');
        }

        function startCommand() {
            const list = tasks[currentRoom];
            const task = list[Math.floor(Math.random() * list.length)];
            
            instr.innerText = task;
            instr.classList.add('glitch');
            subText.innerText = "Выполняйте немедленно";
            
            let timeLeft = 30;
            timerDisp.innerText = timeLeft;
            
            const countdown = setInterval(() => {
                timeLeft--;
                timerDisp.innerText = timeLeft;
                
                if (timeLeft % 5 === 0) tg.HapticFeedback.selectionChanged();

                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    instr.classList.remove('glitch');
                    instr.innerText = "Приказ выполнен";
                    subText.innerText = "Ожидайте следующего цикла";
                    timerDisp.innerText = "OK";
                    tg.HapticFeedback.notificationOccurred('success');
                }
            }, 1000);
        }

        // Инициализация при загрузке
        window.onload = startWebcam;
    </script>
</body>
</html>
