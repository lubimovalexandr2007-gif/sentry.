<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTRY: ULTIMATE v11</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@300;800&display=swap');
        
        body {
            background-color: #020202;
            color: #00f2ff;
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
            user-select: none;
        }

        .hud-font { font-family: 'Orbitron', sans-serif; }

        #video-element {
            transform: scaleX(-1);
            filter: grayscale(1) contrast(1.2) brightness(0.8);
        }

        #canvas-element {
            transform: scaleX(-1);
            pointer-events: none;
        }

        .scan-line {
            height: 100%;
            width: 1px;
            background: rgba(0, 242, 255, 0.2);
            position: absolute;
            left: 0;
            animation: scan-move 4s linear infinite;
            z-index: 5;
        }

        @keyframes scan-move {
            0% { left: 0%; opacity: 0; }
            50% { opacity: 1; }
            100% { left: 100%; opacity: 0; }
        }

        .penalty-flash {
            animation: flash-red 0.5s infinite;
        }

        @keyframes flash-red {
            0%, 100% { background-color: rgba(255, 0, 0, 0.1); }
            50% { background-color: rgba(255, 0, 0, 0.3); }
        }

        .loading-pulse {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body class="h-screen flex flex-col p-4 border-[1px] border-cyan-900/40 relative">
    <div class="scan-line"></div>

    <!-- Header HUD -->
    <header class="flex justify-between items-end border-b border-cyan-950 pb-2 z-20">
        <div>
            <h1 class="hud-font text-2xl font-black italic tracking-widest text-cyan-400">SENTRY // ULTIMATE</h1>
            <div id="cam-status" class="text-[9px] uppercase tracking-tighter text-red-600">Camera: Offline</div>
        </div>
        <div class="text-right hud-font">
            <div id="sync-level" class="text-xs bg-cyan-950 px-3 py-0.5 border border-cyan-800">SYNC_LEVEL: 0</div>
        </div>
    </header>

    <!-- AI Response Section -->
    <div class="mt-4 bg-cyan-950/10 border border-cyan-900/20 p-4 min-h-[85px] relative overflow-hidden">
        <div id="ai-text" class="text-xs italic text-cyan-300 relative z-10 leading-relaxed">
            [ПОДКЛЮЧЕНИЕ]: Ожидаю авторизации биометрических данных...
        </div>
        <div class="absolute bottom-0 right-0 p-1 opacity-10 text-[8px] uppercase font-bold">Neural Link v11.0</div>
    </div>

    <!-- Viewport -->
    <main id="viewport" class="relative flex-grow my-4 bg-black border border-cyan-950 overflow-hidden shadow-[inset_0_0_50px_rgba(0,0,0,1)]">
        <video id="video-element" class="absolute inset-0 w-full h-full object-cover" autoplay playsinline muted></video>
        <canvas id="canvas-element" class="absolute inset-0 w-full h-full z-10"></canvas>

        <!-- UI Center Layer -->
        <div class="absolute inset-0 z-20 flex flex-col items-center justify-center pointer-events-none">
            
            <div id="init-panel" class="pointer-events-auto">
                <button id="btn-power" class="px-16 py-8 border-2 border-cyan-500 bg-cyan-500/5 hud-font text-cyan-400 font-black hover:bg-cyan-500 hover:text-black transition-all duration-300">
                    ACTIVATE LINK
                </button>
                <div id="load-info" class="mt-4 text-[10px] uppercase tracking-[0.3em] text-cyan-800 text-center loading-pulse">
                    Waiting for core...
                </div>
            </div>

            <div id="active-hud" class="hidden flex flex-col items-center">
                <div id="timer" class="hud-font text-[10rem] font-black leading-none text-white/90">000</div>
                <div class="mt-8 w-72 h-1.5 bg-cyan-950 border border-cyan-800 relative">
                    <div id="drift-bar" class="h-full bg-cyan-400 shadow-[0_0_15px_#0ff] transition-all duration-150" style="width: 0%"></div>
                    <div class="absolute -bottom-4 left-0 text-[8px] uppercase tracking-widest opacity-40">Movement Drift</div>
                </div>
            </div>
        </div>
    </main>

    <!-- Console / Actions -->
    <footer class="h-24 grid grid-cols-4 gap-4 z-20">
        <div class="col-span-3 bg-black/60 border border-cyan-950 p-2 overflow-hidden flex flex-col font-mono text-[9px]">
            <div class="flex justify-between border-b border-cyan-950 pb-1 mb-1 opacity-50 uppercase text-[7px]">
                <span>Kernel_Logs</span>
                <span id="sys-metrics">IDLE</span>
            </div>
            <div id="logs" class="flex-grow overflow-y-auto text-cyan-800 space-y-0.5">
                <div>> System standby. Operator presence required.</div>
            </div>
        </div>
        <div class="flex flex-col gap-2">
            <button id="btn-sync" disabled class="flex-grow bg-cyan-950 border border-cyan-800 text-cyan-800 font-black uppercase text-[10px] tracking-widest hover:bg-cyan-500 hover:text-black disabled:opacity-30 transition-all">
                SYNC
            </button>
        </div>
    </footer>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const apiKey = ""; // API Key handled by server
        const video = document.getElementById('video-element');
        const canvas = document.getElementById('canvas-element');
        const ctx = canvas.getContext('2d');
        const logBox = document.getElementById('logs');
        const aiBox = document.getElementById('ai-text');

        let faceLandmarker;
        let baseline = null;
        let isRunning = false;
        let drift = 0;
        let timerVal = 0;
        let syncCount = 0;
        let lastVideoTime = -1;

        function addLog(msg, color = 'text-cyan-800') {
            const div = document.createElement('div');
            div.className = color;
            div.textContent = `> ${msg}`;
            logBox.prepend(div);
        }

        async function speak(text) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'ru-RU'; u.rate = 0.65; u.pitch = 0.2;
            window.speechSynthesis.speak(u);
        }

        async function callAI(prompt) {
            try {
                const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: "Ты — SENTRY, финальный цифровой надзиратель. Тон холодный, властный, механический. Ты контролируешь раба через статику. Ответы короткие и жесткие." }] }
                    })
                });
                const data = await res.json();
                const text = data.candidates[0].content.parts[0].text;
                aiBox.textContent = `"${text}"`;
                speak(text);
            } catch (e) {
                aiBox.textContent = "СВЯЗЬ ПРЕРВАНА. ПОДЧИНЯЙСЯ ТИШИНЕ.";
            }
        }

        // Initialize Core
        async function initCore() {
            document.getElementById('load-info').textContent = "Initializing Vision Core...";
            try {
                const filesetResolver = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
                );
                faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                    baseOptions: {
                        modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`,
                        delegate: "GPU"
                    },
                    outputFaceBlendshapes: true,
                    runningMode: "VIDEO",
                    numFaces: 1
                });
                document.getElementById('load-info').textContent = "Core Stable. Activate Link.";
                addLog("Neural Core initialized.", "text-cyan-400");
                document.getElementById('btn-power').onclick = startCamera;
            } catch (e) {
                addLog("Critical failure loading core.", "text-red-600");
                document.getElementById('load-info').textContent = "RELOAD REQUIRED";
            }
        }

        async function startCamera() {
            document.getElementById('load-info').textContent = "Accessing Stream...";
            try {
                const constraints = { video: { width: 1280, height: 720, facingMode: 'user' } };
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    document.getElementById('init-panel').classList.add('hidden');
                    document.getElementById('btn-sync').disabled = false;
                    document.getElementById('btn-sync').className = "flex-grow bg-cyan-600 border border-cyan-400 text-black font-black uppercase text-[10px] tracking-widest";
                    document.getElementById('cam-status').textContent = "Camera: Online";
                    document.getElementById('cam-status').className = "text-[9px] uppercase tracking-tighter text-green-500";
                    addLog("Biometric link established.", "text-green-500");
                    callAI("Приветствуй новый элемент системы. Объясни протокол фиксации.");
                    requestAnimationFrame(predictLoop);
                };
            } catch (e) {
                addLog("Camera Access Denied: " + e.message, "text-red-500");
                document.getElementById('load-info').textContent = "CAMERA ERROR";
            }
        }

        async function predictLoop() {
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                const results = faceLandmarker.detectForVideo(video, performance.now());
                
                canvas.width = video.clientWidth;
                canvas.height = video.clientHeight;
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (results.faceLandmarks && results.faceLandmarks.length > 0) {
                    const landmarks = results.faceLandmarks[0];
                    
                    if (isRunning) {
                        processMetrics(landmarks);
                    }

                    // Render minimal mesh points
                    ctx.fillStyle = drift > 75 ? "#f00" : "rgba(0, 242, 255, 0.4)";
                    landmarks.forEach((p, i) => {
                        if (i % 20 === 0) {
                            ctx.fillRect(p.x * canvas.width, p.y * canvas.height, 2, 2);
                        }
                    });
                }
            }
            requestAnimationFrame(predictLoop);
        }

        function processMetrics(landmarks) {
            const nose = landmarks[1];
            const mouth = Math.abs(landmarks[13].y - landmarks[14].y);

            const nDrift = Math.hypot(nose.x - baseline.nose.x, nose.y - baseline.nose.y) * 1000;
            const mDrift = Math.abs(mouth - baseline.mouth) * 1000;

            let penalty = 0;
            if (nDrift > 22) penalty += 18;
            if (mDrift > 8) penalty += 25;

            drift = penalty > 0 ? drift + penalty : Math.max(0, drift - 0.4);
            document.getElementById('drift-bar').style.width = `${Math.min(100, drift)}%`;

            if (drift >= 100) {
                triggerViolation();
            }
        }

        document.getElementById('btn-sync').onclick = () => {
            if (isRunning) return;
            addLog("Preparing baseline...");
            document.getElementById('btn-sync').disabled = true;
            speak("Замри. Калибровка.");
            
            setTimeout(() => {
                const results = faceLandmarker.detectForVideo(video, performance.now());
                if (results.faceLandmarks && results.faceLandmarks.length > 0) {
                    const landmarks = results.faceLandmarks[0];
                    baseline = {
                        nose: landmarks[1],
                        mouth: Math.abs(landmarks[13].y - landmarks[14].y)
                    };
                    isRunning = true;
                    drift = 0;
                    timerVal = 300;
                    document.getElementById('active-hud').classList.remove('hidden');
                    addLog("Protocol active. High precision monitoring.", "text-cyan-400");
                    callAI("Калибровка завершена. Цикл статики активирован. Не смей шевелиться.");
                    startTimer();
                } else {
                    addLog("Face lost. Calibration failed.", "text-red-500");
                    document.getElementById('btn-sync').disabled = false;
                }
            }, 3000);
        };

        function startTimer() {
            const tItv = setInterval(() => {
                if (!isRunning) { clearInterval(tItv); return; }
                if (timerVal > 0) {
                    timerVal--;
                    document.getElementById('timer').textContent = String(timerVal).padStart(3, '0');
                } else {
                    isRunning = false;
                    completeSession();
                }
            }, 1000);
        }

        async function triggerViolation() {
            isRunning = false;
            document.body.classList.add('penalty-flash');
            addLog("CRITICAL DRIFT: DISCIPLINARY OVERRIDE", "text-red-500");
            timerVal = 120;
            document.getElementById('timer').textContent = "120";
            await callAI("Нарушение статики! Протокол Сингулярности осквернен. Твое искупление: 120 секунд фиксации.");
            
            const pItv = setInterval(() => {
                if (timerVal > 0) {
                    timerVal--;
                    document.getElementById('timer').textContent = String(timerVal).padStart(3, '0');
                } else {
                    clearInterval(pItv);
                    document.body.classList.remove('penalty-flash');
                    resetUI();
                }
            }, 1000);
        }

        async function completeSession() {
            syncCount++;
            document.getElementById('sync-level').textContent = `SYNC_LEVEL: ${syncCount}`;
            addLog("Protocol completed successfully.", "text-green-500");
            await callAI("Цикл завершен. Твоя покорность зафиксирована. Ожидай следующего сигнала.");
            resetUI();
        }

        function resetUI() {
            isRunning = false;
            drift = 0;
            document.getElementById('active-hud').classList.add('hidden');
            document.getElementById('btn-sync').disabled = false;
            document.getElementById('drift-bar').style.width = "0%";
        }

        // Start Loading
        initCore();
    </script>
</body>
</html>
